  <main>
    <span class="question-badge">Questão 13</span>
    <h1>Concatenar Duas Strings</h1>
    <p class="description">
      Crie um <code>alert</code> que concatena as strings <em>'Sexta-feira'</em>
      e <em>'animada!'</em>.
    </p>

    <div class="code-block">
      <pre><span class="fn">alert</span>(<span class="str">'Sexta-feira'</span> + <span class="str">' e '</span> + <span class="str">'animada!'</span>);</pre>
    </div>

    <div class="run-area">
      <h2>▶ Executar</h2>
      <button class="btn" onclick="runQ13()">Disparar alert</button>
      <div class="output-box" id="out">Clique em executar…</div>
    </div>
  </main>

  <footer>deveres-js · questão 13 / 15</footer>
  <script src="nav.js"></script>
  <script>
    function runQ13() {
      const msg = 'Sexta-feira' + ' e ' + 'animada!';
      alert(msg);
      document.getElementById('out').textContent = '> ' + msg;
    }
  </script>
