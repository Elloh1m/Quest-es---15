  <main>
    <span class="question-badge">Questão 12</span>
    <h1>Tipo de Dado com typeof</h1>
    <p class="description">
      Utilize o console para imprimir o tipo de dado de uma variável que contém o número <strong>100</strong>.
    </p>

    <div class="code-block">
      <pre><span class="kw">let</span> <span class="var">numero</span> = <span class="num">100</span>;
<span class="var">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="var">numero</span>);</pre>
    </div>

    <div class="run-area">
      <h2>▶ Simular console</h2>
      <button class="btn" onclick="runQ12()">Executar</button>
      <div class="output-box" id="out">Clique em executar…</div>
    </div>
  </main>

  <footer>deveres-js · questão 12 / 15</footer>
  <script src="nav.js"></script>
  <script>
    function runQ12() {
      let numero = 100;
      const tipo = typeof numero;
      console.log(tipo);
      document.getElementById('out').textContent = '> ' + tipo;
    }
  </script>
