  <main>
    <span class="question-badge">Questão 14</span>
    <h1>Variável status Booleana</h1>
    <p class="description">
      Declare uma variável <code>status</code> como <code>true</code>
      e exiba seu valor no console.
    </p>

    <div class="code-block">
      <pre><span class="kw">let</span> <span class="var">status</span> = <span class="kw">true</span>;
<span class="var">console</span>.<span class="fn">log</span>(<span class="var">status</span>);</pre>
    </div>

    <div class="run-area">
      <h2>▶ Simular console</h2>
      <button class="btn" onclick="runQ14()">Executar</button>
      <div class="output-box" id="out">Clique em executar…</div>
    </div>
  </main>

  <footer>deveres-js · questão 14 / 15</footer>
  <script src="nav.js"></script>
  <script>
    function runQ14() {
      let status = true;
      console.log(status);
      document.getElementById('out').textContent = '> ' + status;
    }
